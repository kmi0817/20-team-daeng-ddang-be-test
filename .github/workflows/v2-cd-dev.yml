name: BE CD DEV (V2)

on:
  workflow_run:
    workflows: ["BE CI (V2)"]
    types: [completed]

permissions:
  contents: read
  actions: read
  id-token: write

concurrency:
  group: be-v2-cd-dev-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: true

env:
  AWS_REGION: ap-northeast-2
  ENV_NAME: dev
  SSM_PREFIX: /daeng-map/prod/be # 테스트용 추후 dev로 변경

  APP_DIR: /opt/app/backend
  OPS_DIR: /opt/app/backend/ops
  COMPOSE_FILE: /opt/app/backend/ops/compose/docker-compose.bg.yml

  S3_PREFIX: ops/v2/be

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20

    environment: dev

    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'dev' &&
      github.event.workflow_run.event == 'push'

    outputs:
      cd_start: ${{ steps.cd_time.outputs.start }}
      cd_end: ${{ steps.cd_time_end.outputs.end }}
      deploy_start: ${{ steps.time_deploy.outputs.start }}
      deploy_end: ${{ steps.time_deploy.outputs.end }}
      image_tag: ${{ steps.meta.outputs.image_tag }}
      short_sha: ${{ steps.meta.outputs.short_sha }}
      commit_sha: ${{ steps.meta.outputs.commit_sha }}

    steps:
      - name: Record CD start
        id: cd_time
        run: echo "start=$(date +%s)" >> "$GITHUB_OUTPUT"

      # CI가 돌았던 커밋으로 checkout
      - name: Checkout (CI head_sha)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 1

      - name: Download image meta from CI run
        uses: actions/download-artifact@v4
        with:
          name: image-meta
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: meta

      - name: Load image meta
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          set -a
          source meta/image-meta.env
          set +a

          echo "IMAGE_TAG=${IMAGE_TAG}" >> "$GITHUB_ENV"
          echo "COMMIT_SHA=${COMMIT_SHA}" >> "$GITHUB_ENV"
          echo "SHORT_SHA=${SHORT_SHA}" >> "$GITHUB_ENV"

          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "commit_sha=${COMMIT_SHA}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}

      - name: Upload ops/ to S3
        shell: bash
        env:
          S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
        run: |
          set -euo pipefail
          test -d ops || { echo "ops/ directory not found in repo" >&2; exit 1; }

          DEST="s3://${S3_BUCKET}/${S3_PREFIX}"
          echo "Uploading ./ops -> ${DEST}"
          aws s3 sync ops "${DEST}" --delete

      - name: Deploy via SSM
        id: time_deploy
        env:
          S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
          IMAGE_REPO: ${{ secrets.DOCKER_IMAGE }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          start=$(date +%s); echo "start=${start}" >> "$GITHUB_OUTPUT"

          # 대상 인스턴스 ID 먼저 조회해서 로그에 남기기
          INSTANCE_IDS="$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=daeng-map-sandbox-server" "Name=instance-state-name,Values=running" \
            --query "Reservations[].Instances[].InstanceId" --output text)"

          if [ -z "${INSTANCE_IDS:-}" ]; then
            echo "No running instances matched tag Name=daeng-map-sandbox-server" >&2
            exit 1
          fi
          echo "🚀 Sending SSM command to: ${INSTANCE_IDS}"

          # -----------------------------
          # SSM에서 실행할 실제 스크립트 정의
          # -----------------------------
          S3_OPS_URI="s3://${S3_BUCKET}/${S3_PREFIX}"

          # 파라미터를 JSON 형태로 미리 구성 (가독성과 안전성)
          SSM_PARAMS=$(cat <<EOF
          {
            "commands": [
              "bash -lc 'set -euo pipefail; mkdir -p \"${OPS_DIR}\" \"${APP_DIR}\" '",
              "bash -lc 'set -euo pipefail; aws s3 sync \"${S3_OPS_URI}\" \"${OPS_DIR}\" --delete'",
              "bash -lc 'set -euo pipefail; find \"${OPS_DIR}\" -type f -name \"*.sh\" -exec chmod +x {} +'",
              "bash -lc 'set -euo pipefail; echo \"${DOCKERHUB_TOKEN}\" | docker login -u \"${DOCKERHUB_USERNAME}\" --password-stdin'",
              "bash -lc 'set -euo pipefail; export REGION=\"${AWS_REGION}\"; export SSM_PREFIX=\"${SSM_PREFIX}\"; export APP_DIR=\"${APP_DIR}\"; export COMPOSE_FILE=\"${COMPOSE_FILE}\"; export SPRING_PROFILES_ACTIVE=\"dev\"; export IMAGE_REPO=\"${IMAGE_REPO}\"; export IMAGE_TAG=\"${IMAGE_TAG}\"; cd \"${OPS_DIR}/deploy\"; ./cd-dev.sh'"
            ]
          }
          EOF
          )

          COMMAND_ID="$(
            aws ssm send-command \
              --document-name "AWS-RunShellScript" \
              --comment "BE CD DEV ops-run ${COMMIT_SHA}" \
              --targets "Key=tag:Name,Values=daeng-map-sandbox-server" \
              --parameters "$SSM_PARAMS" \
              --query "Command.CommandId" --output text
          )"

          echo "✅ CommandId=${COMMAND_ID}"
          echo "command_id=${COMMAND_ID}" >> "$GITHUB_OUTPUT"

          # 종료될 때까지 최대 15분 대기
          deadline=$(( $(date +%s) + 900 ))
          while true; do
            statuses="$(aws ssm list-command-invocations --command-id "$COMMAND_ID" --details \
              --query "CommandInvocations[].Status" --output text || true)"

            if [ -z "${statuses:-}" ]; then
              sleep 2
            elif echo "$statuses" | tr '\t' '\n' | grep -Eq '^(Pending|InProgress|Delayed)$'; then
              sleep 3
            else
              break
            fi

            if [ "$(date +%s)" -gt "$deadline" ]; then
              echo "SSM command timeout" >&2
              exit 1
            fi
          done

          # 요약 테이블
          aws ssm list-command-invocations --command-id "$COMMAND_ID" --details \
            --query "CommandInvocations[*].{InstanceId:InstanceId,Status:Status}" --output table

          # 실패 판정
          BAD_CNT="$(aws ssm list-command-invocations --command-id "$COMMAND_ID" --details \
            --query "length(CommandInvocations[?Status!='Success'])" --output text)"

          if [ "$BAD_CNT" != "0" ]; then
            echo "❌ Deploy failed. Dumping stdout/stderr..."
            aws ssm list-command-invocations --command-id "$COMMAND_ID" --details \
              --query "CommandInvocations[*].{
                InstanceId:InstanceId,
                Status:Status,
                StdOut:CommandPlugins[0].Output,
                StdErr:CommandPlugins[0].StandardErrorContent
              }" --output json || true
            exit 1
          fi

          end=$(date +%s); echo "end=${end}" >> "$GITHUB_OUTPUT"

      - name: Record CD end
        id: cd_time_end
        if: always()
        run: echo "end=$(date +%s)" >> "$GITHUB_OUTPUT"

  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: deploy
    if: >
      always() &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'dev' &&
      github.event.workflow_run.event == 'push'
    timeout-minutes: 3
    steps:
      - name: Notify
        if: always()
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          JOB_STATUS: ${{ needs.deploy.result }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          TIMESTAMP: ${{ github.event.workflow_run.updated_at }}
          ACTOR: ${{ github.actor }}
          BRANCH: ${{ github.event.workflow_run.head_branch }}
          EVENT_NAME: ${{ github.event_name }}

          CD_START: ${{ needs.deploy.outputs.cd_start }}
          CD_END: ${{ needs.deploy.outputs.cd_end }}
          DEPLOY_S: ${{ needs.deploy.outputs.deploy_start }}
          DEPLOY_E: ${{ needs.deploy.outputs.deploy_end }}
          IMAGE_TAG: ${{ needs.deploy.outputs.image_tag }}
          COMMIT_SHA: ${{ needs.deploy.outputs.commit_sha }}
        run: |
          set -euo pipefail

          [ -z "${WEBHOOK:-}" ] && echo "⚠️ DISCORD_WEBHOOK_URL이 공백이므로 본 단계를 스킵합니다." && exit 0

          # 안전한 산술 계산용 함수
          dur() { local s="${1:-}" e="${2:-}"; [ -n "$s" ] && [ -n "$e" ] && echo $((e - s)) || echo 0; }

          cd_total="$(dur "$CD_START" "$CD_END")"
          deploy_sec="$(dur "$DEPLOY_S" "$DEPLOY_E")"

          if [ "$JOB_STATUS" = "success" ]; then
            TITLE="✅ [BE / ${ENV_NAME}] CD Success"
            COLOR=5763719
          elif [ "$JOB_STATUS" = "cancelled" ]; then
            TITLE="⚠️ [BE / ${ENV_NAME}] CD Cancelled"
            COLOR=16776988
          elif [ "$JOB_STATUS" = "skipped" ]; then
            TITLE="⏭️ [BE / ${ENV_NAME}] CD Skipped"
            COLOR=9807270
          else
            TITLE="❌ [BE / ${ENV_NAME}] CD Failed"
            COLOR=15548997
          fi

          JSON_PAYLOAD=$(cat <<JSON
          {
            "embeds": [
              {
                "title": "$TITLE",
                "url": "$RUN_URL",
                "color": $COLOR,
                "fields": [
                  {"name":"Release ID","value":"\`${COMMIT_SHA}\`","inline":false},

                  {"name":"Actor","value":"${ACTOR}","inline":true},
                  {"name":"Branch","value":"${BRANCH}","inline":true},
                  {"name": "Event Name","value":"${EVENT_NAME}","inline":true},

                  {"name":"Total CD","value":"${cd_total}s","inline":true},
                  {"name":"Deploy","value":"${deploy_sec}s","inline":true},
                  {"name":"Image Tag","value":"\`${IMAGE_TAG}\`","inline":true}
                ],
                "timestamp": "$TIMESTAMP"
              }
            ]
          }
          JSON
          )

          curl -sS -X POST -H "Content-Type: application/json" --data-binary "$JSON_PAYLOAD" "$WEBHOOK" || true
