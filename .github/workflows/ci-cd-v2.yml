name: BE CI/CD

on:
  pull_request:
    branches: ["main", "dev"]
  push:
    branches: ["main", "dev"]
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write

concurrency:
  group: be-ci-cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  RELEASE_ID: ${{ github.sha }}
  DOCKER_IMAGE: ${{ secrets.DOCKER_IMAGE }}
  MESSAGE: >-
    ${{
      github.event.pull_request.title ||
      github.event.head_commit.message ||
      github.workflow
    }}

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    timeout-minutes: 20

    environment:
      name: >-
        ${{
          (github.event_name == 'pull_request' && github.base_ref == 'main') && 'prod' ||
          (github.event_name == 'pull_request') && 'dev' ||
          (github.ref_name == 'main' && 'prod') ||
          'dev'
        }}

    steps:
      - name: Mark CI start
        id: ci_time
        run: echo "start=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"
          cache: "gradle"

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Test
        id: time_test
        run: |
          start=$(date +%s)
          # ./gradlew clean test --no-daemon
          end=$(date +%s)
          echo "start=${start}" >> "$GITHUB_OUTPUT"
          echo "end=${end}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub (push only)
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build
        id: time_build
        run: |
          start=$(date +%s)
          docker build -t "${{ env.DOCKER_IMAGE }}:${{ env.RELEASE_ID}}" .
          end=$(date +%s)
          echo "start=${start}" >> "$GITHUB_OUTPUT"
          echo "end=${end}" >> "$GITHUB_OUTPUT"

      - name: Push (push only)
        if: github.event_name == 'push'
        run: |
          docker push "${{ env.DOCKER_IMAGE }}:${{ env.RELEASE_ID}}"

      - name: Mark CI end
        id: ci_time_end
        if: always()
        run: echo "end=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Notify
        if: always()
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          MESSAGE: ${{ env.MESSAGE }}
          JOB_STATUS: ${{ job.status }}
          RELEASE_ID: ${{ env.RELEASE_ID }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          TIMESTAMP: ${{ github.event.head_commit.timestamp || github.event.pull_request.updated_at }}
          ACTOR: ${{ github.actor }}
          BRANCH: ${{ github.ref_name }}
          EVENT_NAME: ${{ github.event_name }}
          ENV_NAME: >-
            ${{
              (github.event_name == 'pull_request' && github.base_ref == 'main') && 'prod' ||
              (github.event_name == 'pull_request') && 'dev' ||
              (github.ref_name == 'main' && 'prod') ||
              'dev'
            }}

          CI_START: ${{ steps.ci_time.outputs.start }}
          CI_END: ${{ steps.ci_time_end.outputs.end }}

          TEST_S: ${{ steps.time_test.outputs.start }}
          TEST_E: ${{ steps.time_test.outputs.end }}

          BUILD_S: ${{ steps.time_build.outputs.start }}
          BUILD_E: ${{ steps.time_build.outputs.end }}
        run: |
          set -euo pipefail

          [ -z "${WEBHOOK:-}" ] && echo "⚠️ DISCORD_WEBHOOK_URL이 공백이므로 본 단계를 스킵합니다." && exit 0

          # 안전한 산술 계산용 함수
          dur() { local s="${1:-}" e="${2:-}"; [ -n "$s" ] && [ -n "$e" ] && echo $((e - s)) || echo 0; }

          ci_total="$(dur "$CI_START" "$CI_END")"
          test_sec="$(dur "$TEST_S" "$TEST_E")"
          build_sec="$(dur "$BUILD_S" "$BUILD_E")"

          TIMESTAMP="${TIMESTAMP:-$(date -u +%FT%TZ)}"

          if [ "$JOB_STATUS" = "success" ]; then
            TITLE="✅ [BE / ${ENV_NAME}] CI Success"
            COLOR=5763719
          elif [ "$JOB_STATUS" = "cancelled" ]; then
            TITLE="⚠️ [BE / ${ENV_NAME}] CI Cancelled"
            COLOR=16776988
          elif [ "$JOB_STATUS" = "skipped" ]; then
            TITLE="⏭️ [BE / ${ENV_NAME}] CI Skipped"
            COLOR=9807270
          else
            TITLE="❌ [BE / ${ENV_NAME}] CI Failed"
            COLOR=15548997
          fi

          # 개행 문자 및 따옴표 제거, 200자로 자름
          safe_msg=$(echo "$MESSAGE" | tr '\n' ' ' | sed 's/"/\\"/g' | head -c 200)

          JSON_PAYLOAD=$(cat <<JSON
          {
            "embeds": [
              {
                "title": "$TITLE",
                "url": "$RUN_URL",
                "color": $COLOR,
                "description": "${safe_msg}",
                "fields": [
                  {"name":"Release ID","value":"\`${RELEASE_ID}\`","inline":false},

                  {"name":"Actor","value":"${ACTOR}","inline":true},
                  {"name":"Branch","value":"${BRANCH}","inline":true},
                  {"name": "Event Name","value":"${EVENT_NAME}","inline":true},

                  {"name":"Total CI","value":"${ci_total}s","inline":true},
                  {"name":"Test","value":"${test_sec}s","inline":true},
                  {"name":"Build","value":"${build_sec}s","inline":true}
                ],
                "timestamp": "$TIMESTAMP"
              }
            ]
          }
          JSON
          )

          curl -sS -X POST -H "Content-Type: application/json" --data-binary "$JSON_PAYLOAD" "$WEBHOOK" || true

  cd-prod:
    name: CD (Prod)
    needs: ci
    runs-on: ubuntu-latest
    timeout-minutes: 15

    if: github.event_name == 'push' && github.ref_name == 'main'

    environment:
      name: prod

    env:
      ENV_NAME: prod

    steps:
      - name: Mark CD start
        id: cd_time
        run: echo "start=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Checkout (for docker-compose.yml)
        uses: actions/checkout@v4
        with:
          sparse-checkout: docker-compose.yml
          sparse-checkout-cone-mode: false

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-northeast-2

      - name: Check if image tag is already deployed
        id: check_tag
        run: |
          set -euo pipefail

          # 1. 현재 배포되어 있는 태그 가져오기
          CURRENT_TAG=$(aws ssm get-parameter \
            --name "${{ secrets.BE_SSM_DOCKER_IMAGE_PARAM }}/current" \
            --query "Parameter.Value" \
            --output text 2>/dev/null || echo "none")

          TARGET_TAG="${{ env.DOCKER_IMAGE }}:${{ env.RELEASE_ID }}"

          echo "🔍 현재 배포된 태그: $CURRENT_TAG"
          echo "🚀 배포하려는 태그: $TARGET_TAG"

          echo "prev_tag=$CURRENT_TAG" >> "$GITHUB_OUTPUT"

          if [ "$CURRENT_TAG" = "$TARGET_TAG" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "⚠️ 이미 동일한 버전이 배포되어 있습니다. 배포를 건너뜁니다."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload docker-compose.yml to S3
        if: steps.check_tag.outputs.skip != 'true'
        id: s3
        env:
          S3_BUCKET: ${{ secrets.DEPLOY_BUCKET }}
        run: |
          aws s3 cp docker-compose.yml \
            "s3://${{ secrets.DEPLOY_BUCKET }}/be/${{ env.ENV_NAME }}/docker-compose.yml"
          echo "✅ docker-compose.yml S3 업로드 완료"

      - name: Update SSM Parameter (Docker image tag)
        if: steps.check_tag.outputs.skip != 'true'
        id: ssm
        run: |
          aws ssm put-parameter \
            --name "${{ secrets.BE_SSM_DOCKER_IMAGE_PARAM }}/current" \
            --value "${{ env.DOCKER_IMAGE }}:${{ env.RELEASE_ID }}" \
            --type String \
            --overwrite

          echo "✅ SSM 파라미터 업데이트 완료: ${{ env.DOCKER_IMAGE }}:${{ env.RELEASE_ID }}"

      - name: Create new Launch Template version
        if: steps.check_tag.outputs.skip != 'true'
        id: lt
        run: |
          set -euo pipefail

          # 현재 Launch Template의 User Data를 유지하며 Description만 변경하여 새 버전 생성
          NEW_VERSION=$(aws ec2 create-launch-template-version \
            --launch-template-id "${{ secrets.BE_LAUNCH_TEMPLATE_ID }}" \
            --source-version '$Latest' \
            --version-description "deploy-${{ env.RELEASE_ID }}" \
            --launch-template-data '{}' \
            --query 'LaunchTemplateVersion.VersionNumber' \
            --output text)
          echo "version=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "📋 새 Launch Template 버전: ${NEW_VERSION}"

      - name: Start ASG Instance Refresh
        if: steps.check_tag.outputs.skip != 'true'
        id: deploy
        run: |
          set -euo pipefail

          echo "🚀 ASG Instance Refresh 시작: ${{ secrets.BE_ASG_NAME }}"

          REFRESH_ID=$(aws autoscaling start-instance-refresh \
            --auto-scaling-group-name "${{ secrets.BE_ASG_NAME }}" \
            --preferences '{
              "MinHealthyPercentage": 100,
              "InstanceWarmup": 180,
              "SkipMatching": true
            }' \
            --query 'InstanceRefreshId' \
            --output text)

          echo "refresh_id=${REFRESH_ID}" >> "$GITHUB_OUTPUT"
          echo "📋 Instance Refresh ID: ${REFRESH_ID}"

      - name: Wait for Instance Refresh
        if: steps.check_tag.outputs.skip != 'true'
        run: |
          set -euo pipefail

          ASG_NAME="${{ secrets.BE_ASG_NAME }}"
          REFRESH_ID="${{ steps.deploy.outputs.refresh_id }}"

          echo "⏳ Instance Refresh 완료 대기 중..."

          while true; do
            STATUS=$(aws autoscaling describe-instance-refreshes \
              --auto-scaling-group-name "${ASG_NAME}" \
              --instance-refresh-ids "${REFRESH_ID}" \
              --query 'InstanceRefreshes[0].Status' \
              --output text)

            PROGRESS=$(aws autoscaling describe-instance-refreshes \
              --auto-scaling-group-name "${ASG_NAME}" \
              --instance-refresh-ids "${REFRESH_ID}" \
              --query 'InstanceRefreshes[0].PercentageComplete' \
              --output text 2>/dev/null || echo "0")

            echo "📊 상태: ${STATUS} (${PROGRESS}%)"
            case "${STATUS}" in
              Successful)
                echo "✅ Instance Refresh 성공!"
                break
                ;;
              Cancelled|Failed|RollbackSuccessful|RollbackFailed)
                echo "❌ Instance Refresh 실패: ${STATUS}"
                exit 1
                ;;
              *)
                sleep 15
                ;;
            esac
          done

      # 새로운 버전으로 배포가 성공했으며 직전 배포가 존재할 때 백업 이미지로 저장
      - name: Backup Previous Tag
        if: |
          steps.check_tag.outputs.skip != 'true' && 
          steps.check_tag.outputs.prev_tag != 'none' &&
          success()
        run: |
          echo "📦 직전 버전 백업 중: ${{ steps.check_tag.outputs.prev_tag }}"
          aws ssm put-parameter \
            --name "${{ secrets.BE_SSM_DOCKER_IMAGE_PARAM }}/backup" \
            --value "${{ steps.check_tag.outputs.prev_tag }}" \
            --type String \
            --overwrite
          echo "✅ 백업 완료"

      - name: Mark CD end
        id: cd_time_end
        if: always()
        run: echo "end=$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Notify (CD)
        if: always()
        env:
          SKIP: ${{ steps.check_tag.outputs.skip || 'false' }}
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          MESSAGE: ${{ env.MESSAGE }}
          JOB_STATUS: ${{ job.status }}
          RELEASE_ID: ${{ env.RELEASE_ID }}
          ACTOR: ${{ github.actor }}
          BRANCH: ${{ github.ref_name }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          TIMESTAMP: ${{ github.event.head_commit.timestamp }}
          CD_START: ${{ steps.cd_time.outputs.start }}
          CD_END: ${{ steps.cd_time.outputs.end }}
          S3_OUTCOME: ${{ steps.s3.outcome }}
          SSM_OUTCOME: ${{ steps.ssm.outcome }}
          DEPLOY_OUTCOME: ${{ steps.deploy.outcome }}
        run: |
          set -euo pipefail

          [ -z "${WEBHOOK:-}" ] && echo "⚠️ DISCORD_WEBHOOK_URL이 공백이므로 본 단계를 스킵합니다." && exit 0

          # 안전한 산술 계산용 함수
          dur() { local s="${1:-}" e="${2:-}"; [ -n "$s" ] && [ -n "$e" ] && echo $((e - s)) || echo 0; }
          cd_total="$(dur "$CD_START" "$CD_END")"

          if [ "$JOB_STATUS" = "success" ]; then
            TITLE="✅ [BE / ${ENV_NAME}] CD Success"
            COLOR=5763719
          elif [ "$JOB_STATUS" = "cancelled" ]; then
            TITLE="⚠️ [BE / ${ENV_NAME}] CD Cancelled"
            COLOR=16776988
          elif [ "$JOB_STATUS" = "skipped" ]; then
            TITLE="⏭️ [BE / ${ENV_NAME}] CI Skipped"
            COLOR=9807270
          else
            TITLE="❌ [BE / ${ENV_NAME}] CD Failed"
            COLOR=15548997
          fi


          # 개행 문자 및 따옴표 제거, 200자로 자름
          safe_msg=$(echo "$MESSAGE" | tr '\n' ' ' | sed 's/"/\\"/g' | head -c 200)

          # 동일 배포 처리
          if [ "$SKIP" = "true" ]; then
            TITLE="⏭️ [BE / ${ENV_NAME}] CD Skipped due to same Version"
            COLOR=9807270
          fi


          JSON_PAYLOAD=$(cat <<JSON
          {
            "embeds": [
              {
                "title": "$TITLE",
                "url": "$RUN_URL",
                "color": $COLOR,
                "description": "${safe_msg}",
                "fields": [
                  {"name":"Release ID","value":"\`${RELEASE_ID}\`","inline":false},

                  {"name":"Actor","value":"${ACTOR}","inline":true},
                  {"name":"Branch","value":"${BRANCH}","inline":true},
                  {"name":"Total CD","value":"${cd_total}s","inline":true},

                  {"name":"Compose Upload","value":"${S3_OUTCOME}","inline":true},
                  {"name":"SSM Update","value":"${SSM_OUTCOME}","inline":true},
                  {"name":"Instance Refresh","value":"${DEPLOY_OUTCOME}","inline":true}
                ],
                "timestamp": "$TIMESTAMP"
              }
            ]
          }
          JSON
          )

          curl -sS -X POST -H "Content-Type: application/json" --data-binary "$JSON_PAYLOAD" "$WEBHOOK" || true
